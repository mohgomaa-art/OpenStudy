<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acute Kidney Injury</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: transparent;
            color: #0f172a;
            margin: 0;
            padding: 0;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
    <style>
    .card-container {
        perspective: 1000px;
        width: 100%;
        max-width: 550px;
        height: 320px;
    }
    .card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        text-align: center;
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        transform-style: preserve-3d;
        cursor: pointer;
    }
    .card-inner.is-flipped {
        transform: rotateY(180deg);
    }
    .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 2rem;
        border-radius: 1.5rem;
    }
    .card-front {
        background: linear-gradient(135deg, rgba(20, 20, 25, 0.8), rgba(35, 30, 45, 0.8));
        border: 1px solid rgba(139, 92, 246, 0.25);
    }
    .card-back {
        background: linear-gradient(135deg, rgba(30, 25, 40, 0.8), rgba(20, 20, 25, 0.8));
        border: 1px solid rgba(236, 72, 153, 0.25);
        transform: rotateY(180deg);
    }
</style>

</head>
<body class="w-full h-full flex flex-col justify-center items-center overflow-hidden selection:bg-purple-500/30 p-2">
    <!-- Main Workspace -->
    <main class="w-full h-full flex flex-col justify-center items-center relative">
        <div class="w-full max-w-xl flex flex-col items-center gap-6 animate-fade-in">
    <!-- Active recall progress indicator -->
    <div class="w-full flex justify-between items-center text-sm text-zinc-400 px-2">
        <span id="deck-progress">Card 1 of 5</span>
        <span id="card-tag" class="px-2.5 py-0.5 rounded-full text-xs font-medium bg-purple-500/10 text-purple-400 border border-purple-500/20">Tag</span>
    </div>

    <!-- 3D Card -->
    <div class="card-container" onclick="flipCard()">
        <div id="flashcard" class="card-inner">
            <!-- Front -->
            <div class="card-face card-front shadow-2xl shadow-purple-500/5">
                <div class="text-xs font-semibold text-purple-400 tracking-widest uppercase">QUESTION / CONCEPT</div>
                <div id="card-front-text" class="text-xl md:text-2xl font-bold text-white leading-relaxed my-auto flex items-center justify-center">
                    Front Text
                </div>
                <div class="text-xs text-zinc-500 flex items-center justify-center gap-1">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
                    Click to flip and reveal answer
                </div>
            </div>
            <!-- Back -->
            <div class="card-face card-back shadow-2xl shadow-pink-500/5">
                <div class="text-xs font-semibold text-pink-400 tracking-widest uppercase">EXPLANATION / ANSWER</div>
                <div id="card-back-text" class="text-base md:text-lg text-zinc-200 leading-relaxed overflow-y-auto max-h-[170px] my-auto pr-1 flex items-center justify-center text-center">
                    Back Text
                </div>
                <div class="text-xs text-zinc-500 flex items-center justify-center gap-1">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H18.2"></path></svg>
                    Click to flip back
                </div>
            </div>
        </div>
    </div>

    <!-- Navigation controls -->
    <div class="flex items-center gap-4 mt-2">
        <button onclick="prevCard()" class="glass-panel px-4 py-2.5 rounded-xl text-zinc-400 hover:text-white hover:border-zinc-700 transition flex items-center gap-1 bg-zinc-950/20">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            <span>Previous</span>
        </button>
        
        <button onclick="markAsLearnt()" id="learn-btn" class="glass-panel px-5 py-2.5 rounded-xl text-green-400 border-green-500/20 hover:bg-green-500/10 transition flex items-center gap-1.5 bg-zinc-950/20">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span id="learn-btn-text">Active Recall</span>
        </button>
        
        <button onclick="nextCard()" class="glass-panel px-4 py-2.5 rounded-xl text-zinc-400 hover:text-white hover:border-zinc-700 transition flex items-center gap-1 bg-zinc-950/20">
            <span>Next</span>
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
        </button>
    </div>
</div>

    </main>

    <!-- Hidden label to satisfy template script references without breaking layout -->
    <div id="template-name-label" style="display: none;"></div>

    <script>
const VISUAL_DATA = {
  "template": "flashcard",
  "title": "Acute Kidney Injury",
  "cards": [
    {
      "front": "What is the primary definition of Acute Kidney Injury (AKI)?",
      "back": "Acute Kidney Injury (AKI) is defined as a sudden and often reversible decrease in kidney function, characterized by an accumulation of nitrogenous waste products (urea and creatinine) and dysregulation of fluid, electrolyte, and acid-base balance.",
      "tag": "Definition",
      "difficulty": "easy"
    },
    {
      "front": "What are the key diagnostic criteria for AKI according to KDIGO guidelines?",
      "back": "The KDIGO (Kidney Disease: Improving Global Outcomes) criteria for AKI include: 1. Increase in serum creatinine by \">= 0.3 mg/dL (>= 26.5 micromol/L) within 48 hours; OR 2. Increase in serum creatinine to \">= 1.5 times baseline within the prior 7 days; OR 3. Urine volume < 0.5 mL/kg/h for 6 hours.",
      "tag": "Diagnosis",
      "difficulty": "medium"
    },
    {
      "front": "List common prerenal causes of AKI.",
      "back": "Common prerenal causes of AKI include conditions leading to decreased renal perfusion such as hypovolemia (hemorrhage, dehydration, severe burns), decreased effective circulating volume (heart failure, cirrhosis with ascites, nephrotic syndrome), systemic vasodilation (sepsis, anaphylaxis), and renal vasoconstriction (NSAIDs, ACE inhibitors/ARBs in specific settings, hepatorenal syndrome).",
      "tag": "Etiology",
      "difficulty": "easy"
    },
    {
      "front": "What are the main categories of intrinsic (intrarenal) AKI?",
      "back": "The main categories of intrinsic AKI are: 1. Acute Tubular Necrosis (ATN), often due to ischemia or nephrotoxins. 2. Acute Interstitial Nephritis (AIN), commonly drug-induced or infectious. 3. Acute Glomerulonephritis (AGN), caused by immune-mediated damage to glomeruli. 4. Renal vascular disease (e.g., vasculitis, thrombotic microangiopathies).",
      "tag": "Etiology",
      "difficulty": "medium"
    },
    {
      "front": "Describe the pathophysiology of ischemic Acute Tubular Necrosis (ATN).",
      "back": "Ischemic ATN results from prolonged or severe renal hypoperfusion, leading to tubular epithelial cell injury and death. This involves: 1. Loss of cell polarity and detachment of tubular cells, causing obstruction of tubules by cellular debris. 2. Backleak of glomerular filtrate across damaged tubular epithelium. 3. Intrarenal vasoconstriction, further reducing GFR. The combination leads to a significant decline in kidney function.",
      "tag": "Pathophysiology",
      "difficulty": "hard"
    },
    {
      "front": "What are typical postrenal causes of AKI?",
      "back": "Typical postrenal causes of AKI involve obstruction of urine outflow from the kidneys. These include benign prostatic hyperplasia (BPH), kidney stones (nephrolithiasis), tumors (bladder, prostate, cervical, retroperitoneal), strictures, blood clots, and neurogenic bladder dysfunction. Bilateral obstruction or obstruction of a solitary functioning kidney is required to cause AKI.",
      "tag": "Etiology",
      "difficulty": "easy"
    },
    {
      "front": "How does the Fractional Excretion of Sodium (FENa) help differentiate prerenal AKI from Acute Tubular Necrosis (ATN)?",
      "back": "FENa is a crucial diagnostic tool: In prerenal AKI, the kidneys attempt to conserve sodium and water due to hypoperfusion, resulting in a low FENa (<1%). In contrast, in ATN, tubular damage impairs the kidney's ability to reabsorb sodium, leading to a higher FENa (>2%). This distinction helps differentiate between decreased perfusion and intrinsic tubular damage.",
      "tag": "Diagnosis",
      "difficulty": "hard"
    },
    {
      "front": "What are the common electrolyte imbalances seen in AKI?",
      "back": "Common electrolyte imbalances in AKI include hyperkalemia (due to decreased renal excretion), hyperphosphatemia (decreased excretion), hypocalcemia (secondary to hyperphosphatemia and impaired vitamin D activation), and metabolic acidosis (impaired acid excretion and bicarbonate regeneration).",
      "tag": "Complications",
      "difficulty": "medium"
    },
    {
      "front": "Outline the general principles for managing AKI.",
      "back": "General management principles for AKI include: 1. Identifying and treating the underlying cause (e.g., restoring blood volume, discontinuing nephrotoxic drugs, relieving obstruction). 2. Optimizing fluid balance (fluid resuscitation for hypovolemia, fluid restriction for overload). 3. Correcting electrolyte and acid-base abnormalities. 4. Nutritional support. 5. Considering renal replacement therapy (dialysis) for severe cases.",
      "tag": "Management",
      "difficulty": "medium"
    },
    {
      "front": "What are the absolute indications for initiating renal replacement therapy (dialysis) in AKI?",
      "back": "Absolute indications for renal replacement therapy (RRT) in AKI, often remembered by the mnemonic 'AEIOU', include: A - Acidosis (severe, refractory metabolic acidosis); E - Electrolyte abnormalities (severe, refractory hyperkalemia); I - Intoxications (certain dialyzable toxins); O - Overload (refractory fluid overload); U - Uremia (severe uremic symptoms like encephalopathy, pericarditis, or bleeding diathesis).",
      "tag": "Management",
      "difficulty": "hard"
    },
    {
      "front": "Explain the typical mechanism of drug-induced Acute Interstitial Nephritis (AIN).",
      "back": "Drug-induced AIN is typically a hypersensitivity reaction, often cell-mediated. The drug or its metabolites act as haptens, binding to tubular basement membrane proteins and initiating an immune response. This leads to an inflammatory infiltrate of lymphocytes, plasma cells, and eosinophils in the renal interstitium, causing tubular damage and impaired kidney function.",
      "tag": "Pathophysiology",
      "difficulty": "medium"
    },
    {
      "front": "What specific urinalysis findings might suggest Acute Tubular Necrosis (ATN)?",
      "back": "Urinalysis findings suggestive of ATN include muddy brown granular casts, renal tubular epithelial cells, and a low urine specific gravity (around 1.010) indicating impaired concentrating ability. There may also be mild proteinuria and hematuria.",
      "tag": "Diagnosis",
      "difficulty": "medium"
    }
  ]
};
</script>
    
    <script>
    document.getElementById('template-name-label').innerText = 'Interactive Flashcards';
    
    let currentIndex = 0;
    const cards = VISUAL_DATA.cards || [];
    const learntCards = new Set();
    
    function updateCard() {
        if (cards.length === 0) return;
        
        const card = cards[currentIndex];
        const cardElem = document.getElementById('flashcard');
        
        // Remove flipped state
        cardElem.classList.remove('is-flipped');
        
        // Update texts after flip transition finishes or immediately
        setTimeout(() => {
            document.getElementById('card-front-text').innerText = card.front;
            document.getElementById('card-back-text').innerText = card.back;
            document.getElementById('card-tag').innerText = card.tag || 'General';
            document.getElementById('deck-progress').innerText = `Card ${currentIndex + 1} of ${cards.length}`;
            
            const learnBtn = document.getElementById('learn-btn');
            const learnText = document.getElementById('learn-btn-text');
            if (learntCards.has(currentIndex)) {
                learnBtn.classList.replace('text-green-400', 'text-emerald-500');
                learnBtn.classList.add('bg-emerald-500/10');
                learnText.innerText = 'Learnt ✔';
            } else {
                learnBtn.classList.replace('text-emerald-500', 'text-green-400');
                learnBtn.classList.remove('bg-emerald-500/10');
                learnText.innerText = 'Active Recall';
            }
        }, 150);
    }
    
    function flipCard() {
        document.getElementById('flashcard').classList.toggle('is-flipped');
    }
    
    function nextCard() {
        if (cards.length === 0) return;
        currentIndex = (currentIndex + 1) % cards.length;
        updateCard();
    }
    
    function prevCard() {
        if (cards.length === 0) return;
        currentIndex = (currentIndex - 1 + cards.length) % cards.length;
        updateCard();
    }
    
    function markAsLearnt() {
        if (learntCards.has(currentIndex)) {
            learntCards.delete(currentIndex);
        } else {
            learntCards.add(currentIndex);
        }
        updateCard();
    }
    
    // Initialize
    updateCard();
</script>
</body>
</html>
