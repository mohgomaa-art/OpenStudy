    <script>
        function renderMath() {
            if (typeof renderMathInElement === 'function') {
                renderMathInElement(document.body, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\(', right: '\\)', display: false},
                        {left: '\\[', right: '\\]', display: true}
                    ],
                    throwOnError : false
                });
            }
        }
        window.addEventListener('load', renderMath);
        document.addEventListener('DOMContentLoaded', renderMath);
        window.renderMath = renderMath;

        // MutationObserver to automatically render LaTeX math on dynamic DOM modifications
        let mathTimeout = null;
        const observer = new MutationObserver((mutations) => {
            let shouldRender = false;
            for (const mutation of mutations) {
                if (mutation.addedNodes.length > 0 || mutation.type === 'characterData') {
                    shouldRender = true;
                    break;
                }
            }
            if (shouldRender) {
                if (mathTimeout) clearTimeout(mathTimeout);
                mathTimeout = setTimeout(renderMath, 40);
            }
        });
        observer.observe(document.body, {
            childList: true,
            subtree: true,
            characterData: true
        });
    </script>

<body class="w-full h-full flex flex-col justify-center items-center overflow-hidden selection:bg-purple-500/30 p-2">

            <span>Previous</span>

            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span id="learn-btn-text">Active Recall</span>
        </button>
        
        <button onclick="nextCard()" class="glass-panel px-4 py-2.5 rounded-xl text-zinc-400 hover:text-white hover:border-zinc-700 transition flex items-center gap-1 bg-zinc-950/20">
            <span>Next</span>
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
        </button>

</div>

    </main>

    <!-- Hidden label to satisfy template script references without breaking layout -->
    <div id="template-name-label" style="display: none;"></div>

    <script>
const VISUAL_DATA = {
  "template": "flashcard",
  "title": "Aspirin Dosage",
  "topic": "Pharmacology",
  "cards": [
    {
      "front": "Q",
      "back": "A",
      "tag": "Pharm"
    }
  ],
  "variant": "slide_reveal"
};
</script>
    
    <script>
    document.getElementById('template-name-label').innerText = 'Slide Reveal Flashcards';
    
    let currentIndex = 0;
    const cards = VISUAL_DATA.cards || [];
    const learntCards = new Set();
    
    function updateCard() {
        if (cards.length === 0) return;
        
        const card = cards[currentIndex];
        const cardElem = document.getElementById('flashcard');
        
        // Reset reveal position
        cardElem.classList.remove('is-revealed');
        
        setTimeout(() => {
            document.getElementById('card-front-text').innerText = card.front;
            document.getElementById('card-back-text').innerText = card.back;
            document.getElementById('card-tag').innerText = card.tag || 'General';
            document.getElementById('deck-progress').innerText = `Card ${currentIndex + 1} of ${cards.length}`;
            if (window.renderMath) window.renderMath();
            
            const learnBtn = document.getElementById('learn-btn');
            const learnText = document.getElementById('learn-btn-text');
            if (learntCards.has(currentIndex)) {
                learnBtn.classList.replace('text-green-400', 'text-emerald-500');
                learnBtn.classList.add('bg-emerald-500/10');
                learnText.innerText = 'Learnt ✔';
            } else {
                learnBtn.classList.replace('text-emerald-500', 'text-green-400');
                learnBtn.classList.remove('bg-emerald-500/10');
                learnText.innerText = 'Active Recall';
            }
        }, 150);
    }
    
    function toggleReveal() {
        document.getElementById('flashcard').classList.toggle('is-revealed');
    }
    
    function nextCard() {
        if (cards.length === 0) return;
        currentIndex = (currentIndex + 1) % cards.length;
        updateCard();
    }
    
    function prevCard() {
        if (cards.length === 0) return;
        currentIndex = (currentIndex - 1 + cards.length) % cards.length;
        updateCard();
    }
    
    function markAsLearnt() {
        if (learntCards.has(currentIndex)) {
            learntCards.delete(currentIndex);
        } else {
            learntCards.add(currentIndex);
        }
        updateCard();
    }
    
    // Initialize
    updateCard();
</script>
