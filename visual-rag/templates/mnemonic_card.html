<!-- HEAD -->
<style>
    .letter-block {
        width: 3.5rem;
        height: 3.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        font-weight: 800;
        border-radius: 1rem;
        border: 1px solid rgba(255, 255, 255, 0.08);
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        text-shadow: 0 0 10px var(--glow-color);
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }
    .mnemonic-row {
        transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .mnemonic-row:hover {
        transform: translateX(4px);
        border-color: rgba(255, 255, 255, 0.12);
    }
    .mnemonic-row:hover .letter-block {
        transform: scale(1.08);
        box-shadow: 0 0 20px var(--glow-color);
    }
</style>

<!-- BODY -->
<div class="w-full max-w-3xl flex flex-col gap-6 animate-fade-in items-center">
    <!-- Acronym Title Card -->
    <div class="w-full glass-panel p-6 rounded-3xl text-center bg-gradient-to-r from-purple-950/10 via-zinc-950/40 to-pink-950/10 flex flex-col gap-2">
        <h1 id="acronym-title-display" class="text-4xl md:text-5xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 via-pink-400 to-amber-400 tracking-wider select-none leading-tight">
            ACRONYM
        </h1>
        <p id="acronym-description" class="text-xs text-zinc-400 leading-relaxed font-semibold max-w-md mx-auto">
            Acronym description statement.
        </p>
    </div>

    <!-- Mnemonic Breakdown stack -->
    <div id="mnemonic-stack" class="w-full flex flex-col gap-4">
        <!-- Rows injected here -->
    </div>
</div>

<!-- SCRIPT -->
<script>
    document.getElementById('template-name-label').innerText = 'Mnemonic Card';

    const COLOR_SCHEMES = [
        { stroke: "#c084fc", glow: "rgba(192, 132, 252, 0.35)", bg: "bg-purple-500/10 text-purple-400 border-purple-500/20" },
        { stroke: "#ec4899", glow: "rgba(236, 72, 153, 0.35)", bg: "bg-pink-500/10 text-pink-400 border-pink-500/20" },
        { stroke: "#fb923c", glow: "rgba(251, 146, 60, 0.35)", bg: "bg-orange-500/10 text-orange-400 border-orange-500/20" },
        { stroke: "#60a5fa", glow: "rgba(96, 165, 250, 0.35)", bg: "bg-blue-500/10 text-blue-400 border-blue-500/20" },
        { stroke: "#2dd4bf", glow: "rgba(45, 212, 191, 0.35)", bg: "bg-teal-500/10 text-teal-400 border-teal-500/20" },
        { stroke: "#fbbf24", glow: "rgba(251, 191, 36, 0.35)", bg: "bg-yellow-500/10 text-yellow-400 border-yellow-500/20" }
    ];

    function renderMnemonic() {
        const titleDisplay = document.getElementById('acronym-title-display');
        const descDisplay = document.getElementById('acronym-description');
        const stack = document.getElementById('mnemonic-stack');

        titleDisplay.innerText = VISUAL_DATA.mnemonic || 'ACRONYM';
        descDisplay.innerText = VISUAL_DATA.description || '';
        stack.innerHTML = '';

        const items = VISUAL_DATA.items || [];

        items.forEach((item, idx) => {
            const color = COLOR_SCHEMES[idx % COLOR_SCHEMES.length];

            const row = document.createElement('div');
            row.className = 'mnemonic-row glass-panel p-4 rounded-2xl flex items-center gap-5 bg-zinc-950/15 border border-white/5';
            row.setAttribute('style', `--glow-color: ${color.glow}`);

            row.innerHTML = `
                <!-- Glowing Letter Block -->
                <div class="flex-shrink-0 letter-block border border-white/5 ${color.bg}" style="border-color: ${color.stroke};">
                    ${item.letter.toUpperCase()}
                </div>
                
                <!-- Clinical breakdown -->
                <div class="flex-grow flex flex-col gap-1">
                    <h3 class="text-sm font-bold text-white leading-snug">${item.concept}</h3>
                    <p class="text-xs text-zinc-400 leading-relaxed font-medium mt-0.5">${item.detail}</p>
                </div>
            `;

            stack.appendChild(row);
        });

        if (items.length === 0) {
            stack.innerHTML = `<div class="text-center text-zinc-500 text-xs italic py-8">No mnemonic items generated</div>`;
        }
    }

    // Initialize
    renderMnemonic();
</script>
