<!-- HEAD -->
<style>
    .streak-btn {
        transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .streak-btn:hover {
        transform: scale(1.03);
    }
    .streak-card {
        transition: border-color 0.3s, background-color 0.3s;
    }
    .flash-correct {
        animation: flashGreen 0.6s ease-out;
    }
    .flash-incorrect {
        animation: flashRed 0.6s ease-out;
    }
    @keyframes flashGreen {
        0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
        50% { box-shadow: 0 0 20px 4px rgba(16, 185, 129, 0.6); }
        100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }
    @keyframes flashRed {
        0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
        50% { box-shadow: 0 0 20px 4px rgba(239, 68, 68, 0.6); }
        100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }
</style>

<!-- BODY -->
<div class="w-full max-w-2xl flex flex-col gap-6 animate-fade-in px-4">
    <!-- Streak Header Panel -->
    <div class="w-full flex justify-between items-center glass-panel px-6 py-4 rounded-2xl bg-zinc-950/20">
        <div class="flex gap-6">
            <div class="flex flex-col">
                <span class="text-[9px] text-zinc-500 uppercase tracking-widest font-bold">Active Streak</span>
                <span id="current-streak" class="text-xl font-extrabold text-white">0</span>
            </div>
            <div class="flex flex-col">
                <span class="text-[9px] text-zinc-500 uppercase tracking-widest font-bold">Best Streak</span>
                <span id="best-streak" class="text-xl font-extrabold text-purple-400">0</span>
            </div>
        </div>
        <div class="flex flex-col items-end">
            <span class="text-[9px] text-zinc-500 uppercase tracking-widest font-bold">Statement</span>
            <span id="progress-text" class="text-xs font-semibold text-zinc-300">0 / 0</span>
        </div>
    </div>

    <!-- Active Statement Card -->
    <div id="game-card" class="w-full glass-panel border-white/5 bg-zinc-950/25 p-8 rounded-2xl flex flex-col gap-6 items-center justify-center min-h-[250px] relative overflow-hidden streak-card">
        <!-- Rendered statement will go here -->
    </div>

    <!-- Rationale/Continue Container -->
    <div id="explanation-container" class="w-full hidden flex-col gap-4">
        <!-- Explanations go here -->
    </div>
</div>

<!-- SCRIPT -->
<script>
    document.getElementById('template-name-label').innerText = 'True / False Streak Challenge';

    let currentIdx = 0;
    let activeStreak = 0;
    let maxStreak = 0;
    let hasAnswered = false;
    let correctAttempts = 0;

    function initGame() {
        currentIdx = 0;
        activeStreak = 0;
        maxStreak = 0;
        correctAttempts = 0;
        hasAnswered = false;
        
        document.getElementById('current-streak').innerText = activeStreak;
        document.getElementById('best-streak').innerText = maxStreak;
        
        loadStatement();
    }

    function loadStatement() {
        hasAnswered = false;
        document.getElementById('explanation-container').classList.add('hidden');
        
        const statements = VISUAL_DATA.statements || [];
        document.getElementById('progress-text').innerText = `${currentIdx + 1} / ${statements.length}`;

        const card = document.getElementById('game-card');
        card.className = "w-full glass-panel border-white/5 bg-zinc-950/25 p-8 rounded-2xl flex flex-col gap-6 items-center justify-center min-h-[250px] relative overflow-hidden streak-card";
        
        if (statements.length === 0) {
            card.innerHTML = `<p class="text-zinc-500 text-center">No statements loaded.</p>`;
            return;
        }

        const current = statements[currentIdx];

        card.innerHTML = `
            <div class="text-zinc-500 text-[10px] uppercase font-bold tracking-widest mb-1">Verify Statement</div>
            <h2 class="text-xl md:text-2xl font-bold text-white text-center leading-relaxed max-w-lg mb-4">"${current.statement}"</h2>
            
            <div class="flex gap-4 w-full max-w-sm mt-4">
                <button onclick="handleChoice(true)" class="streak-btn flex-1 py-3 px-6 rounded-xl font-bold border border-emerald-500/20 bg-emerald-500/5 hover:bg-emerald-500/10 text-emerald-400 text-sm shadow-lg shadow-emerald-500/5">
                    TRUE
                </button>
                <button onclick="handleChoice(false)" class="streak-btn flex-1 py-3 px-6 rounded-xl font-bold border border-red-500/20 bg-red-500/5 hover:bg-red-500/10 text-red-400 text-sm shadow-lg shadow-red-500/5">
                    FALSE
                </button>
            </div>
        `;
        if (window.renderMath) window.renderMath();
    }

    function handleChoice(userChoice) {
        if (hasAnswered) return;
        hasAnswered = true;

        const statements = VISUAL_DATA.statements || [];
        const current = statements[currentIdx];
        const card = document.getElementById('game-card');

        const isCorrect = userChoice === current.is_true;

        if (isCorrect) {
            correctAttempts++;
            activeStreak++;
            if (activeStreak > maxStreak) {
                maxStreak = activeStreak;
                document.getElementById('best-streak').innerText = maxStreak;
            }
            document.getElementById('current-streak').innerText = activeStreak;
            
            card.classList.add('flash-correct', 'border-emerald-500/40', 'bg-emerald-500/10');
            
            // Render correct feedback
            card.innerHTML = `
                <div class="flex flex-col items-center justify-center gap-3">
                    <div class="w-12 h-12 rounded-full border border-emerald-500/30 bg-emerald-500/20 flex items-center justify-center text-emerald-400">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <span class="text-sm font-bold text-emerald-400">CORRECT!</span>
                    <span class="text-zinc-500 text-[10px] tracking-widest uppercase font-bold mt-2">Active Streak: ${activeStreak}</span>
                </div>
            `;

            // Auto-advance after 1 second
            setTimeout(() => {
                advanceGame();
            }, 1000);

        } else {
            // Reset active streak
            activeStreak = 0;
            document.getElementById('current-streak').innerText = activeStreak;
            
            card.classList.add('flash-incorrect', 'border-red-500/40', 'bg-red-500/10');

            // Render incorrect feedback inside the card
            card.innerHTML = `
                <div class="flex flex-col items-center justify-center gap-3">
                    <div class="w-12 h-12 rounded-full border border-red-500/30 bg-red-500/20 flex items-center justify-center text-red-400">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </div>
                    <span class="text-sm font-bold text-red-400">STREAK BROKEN!</span>
                    <span class="text-zinc-400 text-xs mt-1">The statement is factually <strong class="text-white">${current.is_true ? 'TRUE' : 'FALSE'}</strong>.</span>
                </div>
            `;

            // Render detailed explanation below
            const explain = document.getElementById('explanation-container');
            explain.classList.remove('hidden');
            explain.classList.add('flex');
            explain.innerHTML = `
                <div class="glass-panel border-purple-500/20 bg-purple-950/5 p-5 rounded-xl flex flex-col gap-2 animate-fade-in">
                    <span class="text-[10px] text-purple-400 font-bold uppercase tracking-wider">Concept Explanation</span>
                    <p class="text-zinc-300 text-sm leading-relaxed">${current.explanation}</p>
                </div>
                <button onclick="advanceGame()" class="ml-auto px-6 py-2.5 rounded-xl font-semibold bg-zinc-900 border border-white/10 hover:border-white/20 text-white text-sm transition-all">
                    ${currentIdx < statements.length - 1 ? 'Continue Streak Run' : 'View Final Results'}
                </button>
            `;
            if (window.renderMath) window.renderMath();
        }
    }

    function advanceGame() {
        const statements = VISUAL_DATA.statements || [];
        if (currentIdx < statements.length - 1) {
            currentIdx++;
            loadStatement();
        } else {
            showEndScreen();
        }
    }

    function showEndScreen() {
        document.getElementById('explanation-container').classList.add('hidden');
        const card = document.getElementById('game-card');
        card.className = "w-full glass-panel border-white/5 bg-zinc-950/25 p-8 rounded-2xl flex flex-col gap-6 items-center justify-center min-h-[300px] relative overflow-hidden streak-card";
        
        const statements = VISUAL_DATA.statements || [];
        const scorePct = Math.round((correctAttempts / statements.length) * 100);

        card.innerHTML = `
            <div class="flex flex-col items-center justify-center gap-6 text-center animate-fade-in py-6">
                <div class="w-16 h-16 rounded-2xl bg-purple-500/10 border border-purple-500/20 flex items-center justify-center text-purple-400 text-3xl font-extrabold">
                    🏆
                </div>
                
                <div class="flex flex-col gap-2">
                    <h3 class="text-2xl font-bold text-white">Streak Run Completed!</h3>
                    <p class="text-zinc-400 text-sm">You answered <strong class="text-white">${correctAttempts}</strong> out of <strong class="text-white">${statements.length}</strong> statements correctly (${scorePct}% accuracy).</p>
                </div>

                <div class="flex gap-4 w-full justify-center">
                    <div class="glass-panel border-white/5 bg-zinc-950/20 px-6 py-3 rounded-2xl flex flex-col gap-1 items-center">
                        <span class="text-[9px] text-zinc-500 uppercase tracking-widest font-bold">Best Streak</span>
                        <span class="text-lg font-bold text-purple-400">${maxStreak}</span>
                    </div>
                    <div class="glass-panel border-white/5 bg-zinc-950/20 px-6 py-3 rounded-2xl flex flex-col gap-1 items-center">
                        <span class="text-[9px] text-zinc-500 uppercase tracking-widest font-bold">Accuracy</span>
                        <span class="text-lg font-bold text-white">${scorePct}%</span>
                    </div>
                </div>

                <button onclick="initGame()" class="px-6 py-2.5 rounded-xl font-semibold bg-zinc-900 border border-white/10 hover:border-white/20 text-white text-sm transition-all mt-2">
                    Start New Run
                </button>
            </div>
        `;
    }

    // Initialize Game
    initGame();
</script>
