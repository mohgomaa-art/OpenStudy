<!-- HEAD -->
<style>
    .timeline-container {
        position: relative;
    }
    .timeline-line {
        position: absolute;
        left: 31px;
        top: 0;
        bottom: 0;
        width: 2px;
        background: linear-gradient(to bottom, rgba(139, 92, 246, 0.5) 0%, rgba(236, 72, 153, 0.5) 50%, rgba(251, 146, 60, 0.5) 100%);
    }
    .timeline-dot {
        position: absolute;
        left: 24px;
        top: 24px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background-color: #09090b;
        transition: transform 0.3s;
    }
    .timeline-card {
        margin-left: 64px;
        transition: transform 0.2s, border-color 0.2s;
    }
    .timeline-card:hover {
        transform: translateY(-2px);
    }
    .timeline-item:hover .timeline-dot {
        transform: scale(1.3);
        box-shadow: 0 0 10px var(--dot-glow);
    }
</style>

<!-- BODY -->
<div class="w-full max-w-3xl flex flex-col gap-6 animate-fade-in">
    <!-- Chronological order list -->
    <div class="timeline-container w-full">
        <!-- Vertical Timeline Path Line -->
        <div class="timeline-line"></div>
        
        <!-- Events list wrapper -->
        <div id="timeline-list" class="flex flex-col gap-8">
            <!-- Timeline elements will go here -->
        </div>
    </div>
</div>

<!-- SCRIPT -->
<script>
    document.getElementById('template-name-label').innerText = 'Chronological Timeline';

    const COLOR_MAP = {
        purple: { stroke: "#c084fc", glow: "rgba(192, 132, 252, 0.5)", bg: "bg-purple-500/10 text-purple-400 border-purple-500/20" },
        teal: { stroke: "#2dd4bf", glow: "rgba(45, 212, 191, 0.5)", bg: "bg-teal-500/10 text-teal-400 border-teal-500/20" },
        coral: { stroke: "#fb923c", glow: "rgba(251, 146, 60, 0.5)", bg: "bg-orange-500/10 text-orange-400 border-orange-500/20" },
        blue: { stroke: "#60a5fa", glow: "rgba(96, 165, 250, 0.5)", bg: "bg-blue-500/10 text-blue-400 border-blue-500/20" },
        amber: { stroke: "#fbbf24", glow: "rgba(251, 191, 36, 0.5)", bg: "bg-yellow-500/10 text-yellow-400 border-yellow-500/20" }
    };

    function renderTimeline() {
        const container = document.getElementById('timeline-list');
        container.innerHTML = '';
        
        const events = VISUAL_DATA.events || [];
        
        events.forEach((event, idx) => {
            const colorConfig = COLOR_MAP[event.color] || COLOR_MAP.purple;
            
            const item = document.createElement('div');
            item.setAttribute('class', 'timeline-item relative w-full');
            item.setAttribute('style', `--dot-glow: ${colorConfig.stroke}`);

            // Circle indicator on timeline track
            const dot = document.createElement('div');
            dot.setAttribute('class', 'timeline-dot border-2 shadow-sm');
            dot.setAttribute('style', `border-color: ${colorConfig.stroke};`);
            item.appendChild(dot);

            // Information details card
            const card = document.createElement('div');
            card.setAttribute('class', 'timeline-card glass-panel p-5 rounded-2xl bg-zinc-950/15 flex flex-col gap-2');
            card.setAttribute('style', `border-left: 3px solid ${colorConfig.stroke};`);
            
            card.innerHTML = `
                <div class="flex items-center flex-wrap gap-2.5">
                    <span class="px-2.5 py-0.5 rounded-full text-xs font-semibold border ${colorConfig.bg}">
                        ${event.time}
                    </span>
                    <h3 class="text-base font-bold text-white leading-snug">${event.label}</h3>
                </div>
                <p class="text-zinc-400 text-xs mt-1.5 leading-relaxed">${event.detail}</p>
            `;
            
            item.appendChild(card);
            container.appendChild(item);
        });
    }

    // Initialize Timeline
    renderTimeline();
</script>
