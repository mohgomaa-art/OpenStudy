<!-- HEAD -->
<style>
    .option-card {
        transition: border-color 0.2s, background-color 0.2s, transform 0.2s;
    }
    .option-card:hover:not(.is-disabled) {
        transform: translate3d(2px, 0, 0);
        border-color: rgba(255, 255, 255, 0.2);
    }
    .nav-dot {
        transition: background-color 0.3s, border-color 0.3s, transform 0.2s;
    }
    .nav-dot.is-active {
        transform: scale(1.15);
        box-shadow: 0 0 10px rgba(167, 139, 250, 0.3);
    }
</style>

<!-- BODY -->
<div class="w-full flex flex-col md:flex-row gap-6 animate-fade-in max-w-5xl px-2">
    <!-- Left Navigation Sidebar -->
    <div class="w-full md:w-64 flex-shrink-0 glass-panel rounded-2xl p-4 flex flex-col gap-4 bg-zinc-950/20">
        <div class="flex justify-between items-center border-b border-zinc-900 pb-2">
            <span class="text-xs text-zinc-500 font-bold uppercase tracking-wider">Quiz Progress</span>
            <span id="score-text" class="text-xs text-purple-400 font-bold">0 / 0 Correct</span>
        </div>
        
        <!-- Questions navigation list -->
        <div id="nav-list" class="flex md:flex-col flex-wrap gap-2 max-h-[200px] md:max-h-none overflow-y-auto pr-1">
            <!-- Nav dots will be rendered here -->
        </div>

        <div class="mt-auto hidden md:flex flex-col gap-2 pt-4 border-t border-zinc-900">
            <div class="flex items-center gap-2 text-xs text-zinc-500">
                <span class="w-3 h-3 rounded-full bg-emerald-500/20 border border-emerald-500/30"></span> Correct
            </div>
            <div class="flex items-center gap-2 text-xs text-zinc-500">
                <span class="w-3 h-3 rounded-full bg-red-500/20 border border-red-500/30"></span> Incorrect
            </div>
        </div>
    </div>

    <!-- Right Workspace Area -->
    <div id="quiz-workspace" class="flex-grow glass-panel rounded-2xl p-6 md:p-8 bg-zinc-950/45 flex flex-col gap-6 relative min-h-[400px]">
        <!-- Rendered Active Question Go Here -->
    </div>
</div>

<!-- SCRIPT -->
<script>
    document.getElementById('template-name-label').innerText = 'Single Best Answer MCQ';

    let currentIdx = 0;
    let selectedOption = null;
    let answers = []; // 'correct', 'incorrect', null for each question
    let userAnswers = []; // holds selected option text for each question

    function initQuiz() {
        const questions = VISUAL_DATA.questions || [];
        answers = new Array(questions.length).fill(null);
        userAnswers = new Array(questions.length).fill(null);
        currentIdx = 0;
        selectedOption = null;
        renderNav();
        renderQuestion();
    }

    function renderNav() {
        const navList = document.getElementById('nav-list');
        navList.innerHTML = '';
        const questions = VISUAL_DATA.questions || [];
        
        questions.forEach((q, idx) => {
            const btn = document.createElement('button');
            btn.onclick = () => {
                currentIdx = idx;
                selectedOption = userAnswers[idx];
                renderNav();
                renderQuestion();
            };

            let statusClass = "border-zinc-850 hover:border-zinc-700 bg-zinc-950/20 text-zinc-400";
            if (answers[idx] === 'correct') {
                statusClass = "border-emerald-500/30 bg-emerald-500/10 text-emerald-400";
            } else if (answers[idx] === 'incorrect') {
                statusClass = "border-red-500/30 bg-red-500/10 text-red-400";
            }

            if (idx === currentIdx) {
                statusClass += " is-active border-purple-500/50 text-white";
            }

            btn.className = `nav-dot flex-grow md:flex-grow-0 flex items-center gap-3 px-4 py-2.5 rounded-xl border text-xs font-semibold text-left transition-all ${statusClass}`;
            btn.innerHTML = `
                <span class="w-5 h-5 flex-shrink-0 rounded-full border border-black/20 flex items-center justify-center font-bold bg-black/20 text-[10px]">${idx + 1}</span>
                <span class="truncate max-w-[120px] hidden md:inline">${q.question}</span>
            `;
            navList.appendChild(btn);
        });

        // Update score tracker
        const correctCount = answers.filter(a => a === 'correct').length;
        document.getElementById('score-text').innerText = `${correctCount} / ${questions.length} Correct`;
    }

    function renderQuestion() {
        const workspace = document.getElementById('quiz-workspace');
        const questions = VISUAL_DATA.questions || [];
        
        if (questions.length === 0) {
            workspace.innerHTML = `<p class="text-zinc-500 text-center my-auto">No questions loaded.</p>`;
            return;
        }

        const q = questions[currentIdx];
        const hasAnswered = answers[currentIdx] !== null;

        let optionsHTML = q.options.map((option, oIdx) => {
            let borderClass = 'border-white/5 bg-zinc-950/15';
            let iconHTML = '';
            let disabledClass = hasAnswered ? 'is-disabled pointer-events-none' : '';

            if (hasAnswered) {
                if (option === q.answer) {
                    borderClass = 'border-emerald-500/40 bg-emerald-500/10 text-emerald-300';
                    iconHTML = `<svg class="w-5 h-5 text-emerald-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>`;
                } else if (option === userAnswers[currentIdx]) {
                    borderClass = 'border-red-500/40 bg-red-500/10 text-red-300';
                    iconHTML = `<svg class="w-5 h-5 text-red-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                } else {
                    borderClass = 'border-white/5 opacity-40 bg-zinc-950/10';
                }
            } else if (selectedOption === option) {
                borderClass = 'border-purple-500/40 bg-purple-500/10 text-purple-300';
            }

            return `
                <div onclick="selectOption('${option.replace(/'/g, "\\'")}')" class="w-full glass-panel option-card p-4 rounded-xl border flex items-center justify-between cursor-pointer ${borderClass} ${disabledClass}">
                    <div class="flex items-center gap-3 pr-2">
                        <span class="w-6 h-6 rounded-lg bg-zinc-900 border border-white/5 flex items-center justify-center font-bold text-xs text-zinc-500">${String.fromCharCode(65 + oIdx)}</span>
                        <span class="text-sm font-medium leading-relaxed">${option}</span>
                    </div>
                    ${iconHTML}
                </div>
            `;
        }).join('');

        let rationaleHTML = '';
        if (hasAnswered) {
            rationaleHTML = `
                <div class="glass-panel border-purple-500/20 bg-purple-950/5 p-5 rounded-xl flex flex-col gap-2 animate-fade-in">
                    <span class="text-[10px] text-purple-400 font-bold uppercase tracking-wider">Clinical Rationale</span>
                    <p class="text-zinc-300 text-sm leading-relaxed">${q.explanation}</p>
                </div>
            `;
        }

        let footerHTML = '';
        if (!hasAnswered) {
            footerHTML = `
                <button onclick="submitAnswer()" class="ml-auto px-6 py-2.5 rounded-xl font-semibold bg-gradient-to-r from-purple-500 to-indigo-500 hover:from-purple-600 hover:to-indigo-600 text-white text-sm transition-all shadow-md shadow-purple-500/10">
                    Submit Answer
                </button>
            `;
        } else if (currentIdx < questions.length - 1) {
            footerHTML = `
                <button onclick="nextQuestion()" class="ml-auto px-6 py-2.5 rounded-xl font-semibold bg-zinc-900 border border-white/10 hover:border-white/20 text-white text-sm transition-all">
                    Next Question
                </button>
            `;
        } else {
            footerHTML = `
                <button onclick="finishQuiz()" class="ml-auto px-6 py-2.5 rounded-xl font-semibold bg-gradient-to-r from-purple-500 to-indigo-500 text-white text-sm transition-all">
                    Finish & View Dashboard
                </button>
            `;
        }

        workspace.innerHTML = `
            <div class="flex flex-col gap-1 border-b border-zinc-900 pb-3">
                <span class="text-[10px] text-zinc-500 font-bold uppercase tracking-wider">Question ${currentIdx + 1} of ${questions.length}</span>
                <h2 class="text-lg font-bold text-white leading-snug">${q.question}</h2>
            </div>
            
            <div class="flex flex-col gap-3">
                ${optionsHTML}
            </div>

            ${rationaleHTML}

            <div class="flex mt-auto pt-4 border-t border-zinc-900/50">
                ${footerHTML}
            </div>
        `;
        if (window.renderMath) window.renderMath();
    }

    function selectOption(option) {
        if (answers[currentIdx] !== null) return; // already answered
        selectedOption = option;
        renderQuestion();
    }

    function submitAnswer() {
        if (!selectedOption) return;
        
        const q = VISUAL_DATA.questions[currentIdx];
        userAnswers[currentIdx] = selectedOption;
        
        if (selectedOption === q.answer) {
            answers[currentIdx] = 'correct';
        } else {
            answers[currentIdx] = 'incorrect';
        }

        renderNav();
        renderQuestion();
    }

    function nextQuestion() {
        currentIdx++;
        selectedOption = null;
        renderNav();
        renderQuestion();
    }

    function finishQuiz() {
        const workspace = document.getElementById('quiz-workspace');
        const questions = VISUAL_DATA.questions || [];
        const correctCount = answers.filter(a => a === 'correct').length;
        const pct = Math.round((correctCount / questions.length) * 100);

        let rank = "Novice Intern";
        let rankColor = "text-amber-400";
        if (pct === 100) {
            rank = "Chief Resident";
            rankColor = "text-purple-400";
        } else if (pct >= 80) {
            rank = "Senior Resident";
            rankColor = "text-blue-400";
        } else if (pct >= 60) {
            rank = "Junior Resident";
            rankColor = "text-teal-400";
        }

        workspace.innerHTML = `
            <div class="flex flex-col items-center justify-center gap-6 my-auto text-center animate-fade-in py-8">
                <div class="relative w-32 h-32 flex items-center justify-center">
                    <svg class="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                        <path class="text-zinc-900" stroke-width="3" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path class="text-purple-500" stroke-width="3" stroke-dasharray="${pct}, 100" stroke-linecap="round" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    </svg>
                    <div class="absolute flex flex-col items-center">
                        <span class="text-3xl font-extrabold text-white">${pct}%</span>
                        <span class="text-[9px] text-zinc-500 uppercase tracking-widest font-bold">Accuracy</span>
                    </div>
                </div>
                
                <div class="flex flex-col gap-1.5">
                    <h3 class="text-2xl font-bold text-white">Quiz Completed!</h3>
                    <p class="text-zinc-400 text-sm">You answered <strong class="text-white">${correctCount}</strong> out of <strong class="text-white">${questions.length}</strong> questions correctly.</p>
                </div>

                <div class="glass-panel border-white/5 bg-zinc-950/20 px-6 py-3 rounded-2xl flex flex-col gap-1 items-center">
                    <span class="text-[9px] text-zinc-500 uppercase tracking-widest font-bold">Awarded Title</span>
                    <span class="text-lg font-bold ${rankColor}">${rank}</span>
                </div>

                <button onclick="initQuiz()" class="px-6 py-2.5 rounded-xl font-semibold bg-zinc-900 border border-white/10 hover:border-white/20 text-white text-sm transition-all">
                    Retry Challenge
                </button>
            </div>
        `;
    }

    // Initialize Quiz
    initQuiz();
</script>
