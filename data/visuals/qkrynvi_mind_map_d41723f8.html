
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { background: #0f0f1a; margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; }
        .node circle { fill: #818cf8; stroke: #fff; stroke-width: 1.5px; cursor: pointer; }
        .node text { fill: #f1f5f9; font-size: 12px; pointer-events: none; text-anchor: middle; }
        .link { stroke: rgba(129, 140, 248, 0.3); stroke-opacity: 0.6; }
        .toolbar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(30,30,50,0.8); backdrop-filter: blur(10px); padding: 10px 20px; border-radius: 30px; display: flex; gap: 10px; border: 1px solid rgba(255,255,255,0.1); }
        button { background: #818cf8; border: none; color: white; padding: 5px 15px; border-radius: 15px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        button:hover { background: #a78bfa; }
    </style>
</head>
<body>
    <svg id="mindmap" width="100%" height="100vh"></svg>
    <div class="toolbar">
        <button onclick="zoomIn()">Zoom +</button>
        <button onclick="zoomOut()">Zoom -</button>
        <button onclick="resetZoom()">Reset</button>
    </div>
    <script>
        const data = {"nodes": [{"id": "root", "label": "Bleeding Disorders Pediatrics", "level": 0}, {"id": "b0", "label": "Overview", "level": 1}, {"id": "b0_0", "label": "Bleeding Disorders Pediatrics", "level": 2}], "links": [{"source": "root", "target": "b0"}, {"source": "b0", "target": "b0_0"}]};
        const svg = d3.select("#mindmap");
        const width = window.innerWidth;
        const height = window.innerHeight;
        
        const g = svg.append("g");
        const zoom = d3.zoom().on("zoom", (e) => g.attr("transform", e.transform));
        svg.call(zoom);

        const simulation = d3.forceSimulation(data.nodes)
            .force("link", d3.forceLink(data.links).id(d => d.id).distance(100))
            .force("charge", d3.forceManyBody().strength(-300))
            .force("center", d3.forceCenter(width / 2, height / 2));

        const link = g.append("g").attr("class", "links")
            .selectAll("line").data(data.links).enter().append("line").attr("class", "link");

        const node = g.append("g").attr("class", "nodes")
            .selectAll("g").data(data.nodes).enter().append("g").attr("class", "node")
            .call(d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended));

        node.append("circle").attr("r", d => 30 - d.level * 5);
        node.append("text").attr("dy", 4).text(d => d.label);

        simulation.on("tick", () => {
            link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
            node.attr("transform", d => `translate(${d.x}, ${d.y})`);
        });

        function dragstarted(event, d) { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
        function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
        function dragended(event, d) { if (!event.active) simulation.alphaTarget(0); }
        
        function zoomIn() { svg.transition().call(zoom.scaleBy, 1.3); }
        function zoomOut() { svg.transition().call(zoom.scaleBy, 0.7); }
        function resetZoom() { svg.transition().call(zoom.transform, d3.zoomIdentity); }
    </script>
</body>
</html>
